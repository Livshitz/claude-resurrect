name: ci
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  build:
    runs-on: macos-latest   # package is `os:darwin` → npm ci needs macOS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
